{% set version = "1.16.5" %}

package:
  name: pygltflib
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pygltflib/pygltflib-{{ version }}.tar.gz
  sha256: 1f15740d5a7aaf71a5083e285af6b361184958e255659132f4ba8fe4f3d21ea9

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - dataclasses-json >=0.0.25
    - deprecated

test:
  imports:
    - pygltflib
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://gitlab.com/dodgyville/pygltflib
  summary: Python library for reading, writing and managing 3D objects in the Khronos Group gltf and gltf2 formats.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - h-vetinari
